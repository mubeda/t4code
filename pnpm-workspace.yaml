packages:
  - apps/*
  - infra/*
  - oxlint-plugin-t4code
  - packages/*
  - scripts

# These audited packages were published less than pnpm 11's default 24-hour
# maturity window before this lockfile was generated. Keep each exception exact
# so future releases still wait for the default quarantine period.
minimumReleaseAgeExclude:
  - geckodriver@6.1.1
  - "@cloudflare/workers-types@5.20260718.1"
  - "@tanstack/router-generator@1.167.21"
  - "@tanstack/router-plugin@1.168.22"

catalog:
  "@clerk/backend": 3.11.7
  "@clerk/clerk-js": 6.25.5
  "@clerk/react": 6.12.5
  "@clerk/shared": 4.25.5
  "@tauri-apps/api": 2.11.1
  "@effect/atom-react": 4.0.0-beta.99
  "@effect/platform-node": 4.0.0-beta.99
  "@effect/sql-pg": 4.0.0-beta.99
  "@effect/tsgo": 0.13.2
  "@effect/vitest": 4.0.0-beta.99
  "@noble/curves": 2.2.0
  "@noble/hashes": 2.2.0
  "@pierre/diffs": 1.3.0-beta.10
  "@types/node": 26.1.1
  "@typescript/native-preview": 7.0.0-dev.20260707.2
  effect: 4.0.0-beta.99
  jose: 6.2.3
  typescript: ~6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@0.2.5
  vite-plus: 0.2.5
  yaml: ^2.9.0

allowBuilds:
  "bufferutil@4.1.0": false
  "edgedriver@6.3.0": false
  "esbuild@0.25.12 || 0.28.1": true
  "geckodriver@6.1.1": false
  "msgpackr-extract@3.0.4": true
  "msw@2.15.0": false
  "sharp@0.34.5": true
  "utf-8-validate@6.0.6": false
  "workerd@1.20260704.1": false

overrides:
  # Effect beta.78 accepts fast-check ^4.8.0. Keep its transitive copy aligned
  # with the workspace generator dependency because Arbitrary carries private
  # nominal state and cannot safely cross between duplicate package instances.
  fast-check: 4.9.0

  # Keep every Clerk consumer on the same stable train. Clerk publishes wallet
  # auth integrations as required dependencies, but T4Code does not support
  # wallet auth, so keep that unused dependency tree out of installs.
  "@clerk/backend": "catalog:"
  "@clerk/clerk-js": "catalog:"
  "@clerk/react": "catalog:"
  "@clerk/shared": "catalog:"
  "@clerk/clerk-js>@base-org/account": "-"
  "@clerk/clerk-js>@coinbase/wallet-sdk": "-"
  "@clerk/clerk-js>@solana/wallet-adapter-base": "-"
  "@clerk/clerk-js>@solana/wallet-adapter-react": "-"
  "@clerk/clerk-js>@solana/wallet-standard": "-"
  "@clerk/clerk-js>@wallet-standard/core": "-"
  "@effect/atom-react": "catalog:"
  "@effect/platform-node": "catalog:"
  "@effect/sql-pg": "catalog:"
  "@effect/vitest": "catalog:"
  # @effect/vitest is patched to use vite-plus/test; do not auto-install its
  # upstream Vitest peer and create a second Vite/Vitest toolchain.
  "@effect/vitest>vitest": "-"
  "@pierre/diffs>@shikijs/transformers": ^4.2.0
  "@types/node": "catalog:"
  # @wdio/tauri-service 1.2.0 was published against native-utils 2.4.0,
  # but its bundle imports installMockSyncOverride, which first ships in 2.5.0.
  "@wdio/tauri-service>@wdio/native-utils": 2.5.0
  effect: "catalog:"
  vite: "catalog:"
  yaml: "catalog:"

packageExtensions:
  "@effect/vitest@*":
    dependencies:
      vite-plus: "catalog:"
    peerDependenciesMeta:
      vitest:
        optional: true
  vite-plus@*:
    dependencies:
      vite: "catalog:"

patchedDependencies:
  "@effect/vitest@4.0.0-beta.99": patches/@effect__vitest@4.0.0-beta.99.patch
  "@pierre/diffs@1.3.0-beta.10": patches/@pierre__diffs@1.3.0-beta.10.patch
  "@wdio/tauri-plugin@1.2.0": patches/@wdio__tauri-plugin@1.2.0.patch

peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: "*"
