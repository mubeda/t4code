name: Packaged Desktop UI Smoke

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  desktop_ui_smoke:
    name: Desktop UI - ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            runner: ubuntu-22.04
            platform: linux
            arch: x64
            bundle: appimage
          - label: Windows x64
            runner: windows-2025
            platform: win
            arch: x64
            bundle: nsis
          - label: macOS arm64
            runner: macos-26
            platform: mac
            arch: arm64
            bundle: dmg
          - label: macOS x64
            runner: macos-26-intel
            platform: mac
            arch: x64
            bundle: dmg
    env:
      T4CODE_E2E_PLATFORM: ${{ matrix.platform }}
      T4CODE_E2E_BUNDLE: ${{ matrix.bundle }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version-file: package.json
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@46511b1c83438f0dd37c02d843619ece5a4abb5b # 1.97.1

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            . -> target

      - name: Install Linux desktop automation dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb \
            xdotool

      - name: Install frozen dependencies
        run: vp install --frozen-lockfile

      - name: Build packaged test application
        run: vp run --filter @t4code/desktop test:ui:build

      - name: Resolve Linux AppImage
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          app_path="$(find "$GITHUB_WORKSPACE/target/release/bundle/appimage" -maxdepth 1 -name '*.AppImage' -print -quit)"
          test -n "$app_path"
          chmod +x "$app_path"
          echo "T4CODE_E2E_APP_PATH=$app_path" >> "$GITHUB_ENV"

      - name: Resolve macOS application from DMG build
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          dmg_path="$(find target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -print -quit)"
          test -n "$dmg_path"
          mount_point="$RUNNER_TEMP/t4code-desktop-ui-dmg"
          mkdir -p "$mount_point"
          hdiutil attach "$dmg_path" -mountpoint "$mount_point" -nobrowse -readonly
          app_path="$(find "$mount_point" -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$app_path"
          echo "T4CODE_E2E_APP_PATH=$app_path" >> "$GITHUB_ENV"
          echo "T4CODE_E2E_DMG_MOUNT_POINT=$mount_point" >> "$GITHUB_ENV"

      - name: Install and resolve Windows NSIS application
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $installer = Get-ChildItem "target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if ($null -eq $installer) { throw "NSIS installer was not produced." }
          Start-Process -FilePath $installer.FullName -ArgumentList "/S" -Wait
          $app = Get-ChildItem $env:LOCALAPPDATA -Filter "t4code-desktop.exe" -File -Recurse |
            Select-Object -First 1
          if ($null -eq $app) { throw "NSIS-installed T4Code executable was not found." }
          "T4CODE_E2E_APP_PATH=$($app.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Run packaged desktop UI smoke
        shell: bash
        env:
          T4CODE_E2E_ARTIFACT_DIR: ${{ runner.temp }}/t4code-desktop-ui-artifacts
        run: |
          if [[ "$T4CODE_E2E_PLATFORM" == "linux" ]]; then
            xvfb-run --auto-servernum vp run test:ui:desktop
          else
            vp run test:ui:desktop
          fi

      - name: Unmount macOS test application
        if: always() && matrix.platform == 'mac'
        shell: bash
        run: hdiutil detach "$T4CODE_E2E_DMG_MOUNT_POINT"

      - name: Upload packaged desktop application
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-package-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            target/release/bundle/appimage/*.AppImage
            target/release/bundle/nsis/*.exe
            target/release/bundle/dmg/*.dmg
          if-no-files-found: warn

      - name: Upload desktop UI screenshots and logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: desktop-ui-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            ${{ runner.temp }}/t4code-desktop-ui-artifacts/*.png
            ${{ runner.temp }}/t4code-desktop-ui-artifacts/*.log
          if-no-files-found: warn
