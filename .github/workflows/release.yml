name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "!v*-nightly.*"
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        required: false
        default: stable
        type: choice
        options:
          - stable
          - nightly
      version:
        description: "Release version (for example 1.2.3 or v1.2.3)"
        required: false
        type: string

permissions:
  contents: read
  id-token: none

jobs:
  check_changes:
    name: Check for changes since last nightly
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: check
        name: Compare HEAD to last nightly tag
        run: |
          last_nightly_tag=$(git tag --list 'v*-nightly.*' 'nightly-v*' --sort=-creatordate | head -n 1)
          if [[ -z "$last_nightly_tag" ]]; then
            echo "No previous nightly tag found. Proceeding with release."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          last_nightly_sha=$(git rev-parse "$last_nightly_tag^{commit}")
          head_sha=$(git rev-parse HEAD)

          if [[ "$last_nightly_sha" == "$head_sha" ]]; then
            echo "No changes on main since last nightly release ($last_nightly_tag). Skipping."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected on main since $last_nightly_tag ($last_nightly_sha → $head_sha). Proceeding."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

  preflight:
    name: Preflight
    needs: [check_changes]
    if: |
      !failure() && !cancelled() &&
      (github.event_name != 'schedule' || needs.check_changes.outputs.has_changes == 'true')
    runs-on: ubuntu-24.04
    # GitHub-hosted runners have fewer vCPUs than the upstream Blacksmith
    # runners, so the check/typecheck/test suite needs more headroom.
    timeout-minutes: 30
    outputs:
      release_channel: ${{ steps.release_meta.outputs.release_channel }}
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      release_name: ${{ steps.release_meta.outputs.name }}
      short_sha: ${{ steps.release_meta.outputs.short_sha }}
      previous_tag: ${{ steps.previous_tag.outputs.previous_tag }}
      cli_dist_tag: ${{ steps.release_meta.outputs.cli_dist_tag }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      ref: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - id: release_meta
        name: Resolve release version
        shell: bash
        env:
          DISPATCH_CHANNEL: ${{ github.event.inputs.channel }}
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
          NIGHTLY_DATE: ${{ github.run_started_at }}
          NIGHTLY_SHA: ${{ github.sha }}
          NIGHTLY_RUN_NUMBER: ${{ github.run_number }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" || ( "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${DISPATCH_CHANNEL:-stable}" == "nightly" ) ]]; then
            nightly_date="$(date -u -d "$NIGHTLY_DATE" +%Y%m%d)"

            node scripts/resolve-nightly-release.ts \
              --date "$nightly_date" \
              --run-number "$NIGHTLY_RUN_NUMBER" \
              --sha "$NIGHTLY_SHA" \
              --github-output

            echo "release_channel=nightly" >> "$GITHUB_OUTPUT"
            echo "cli_dist_tag=nightly" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              raw="${DISPATCH_VERSION}"
              if [[ -z "$raw" ]]; then
                echo "workflow_dispatch stable releases require the version input." >&2
                exit 1
              fi
            else
              raw="${GITHUB_REF_NAME}"
            fi

            version="${raw#v}"
            if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid release version: $raw" >&2
              exit 1
            fi

            echo "release_channel=stable" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
            echo "tag=v$version" >> "$GITHUB_OUTPUT"
            echo "name=T4Code v$version" >> "$GITHUB_OUTPUT"
            echo "cli_dist_tag=latest" >> "$GITHUB_OUTPUT"
            if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
              echo "make_latest=true" >> "$GITHUB_OUTPUT"
            else
              echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Check
        run: vp check

      - name: Typecheck
        run: vp run typecheck

      - name: Test
        run: vp run test

      - id: previous_tag
        name: Resolve previous release tag
        run: |
          node scripts/resolve-previous-release-tag.ts \
            --channel "${{ steps.release_meta.outputs.release_channel }}" \
            --current-tag "${{ steps.release_meta.outputs.tag }}" \
            --github-output

  relay_public_config:
    name: Resolve T4 Connect public config
    needs: preflight
    if: ${{ !failure() && !cancelled() && needs.preflight.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: production
    outputs:
      clerk_publishable_key: ${{ steps.public_config.outputs.clerk_publishable_key }}
      clerk_jwt_template: ${{ steps.public_config.outputs.clerk_jwt_template }}
      clerk_cli_oauth_client_id: ${{ steps.public_config.outputs.clerk_cli_oauth_client_id }}
      relay_url: ${{ steps.public_config.outputs.relay_url }}
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      RELAY_DOMAIN: ${{ vars.RELAY_DOMAIN }}
      RELAY_API_ZONE_NAME: ${{ vars.RELAY_API_ZONE_NAME }}
      CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
      CLERK_JWT_TEMPLATE: ${{ vars.CLERK_JWT_TEMPLATE }}
      CLERK_CLI_OAUTH_CLIENT_ID: ${{ vars.CLERK_CLI_OAUTH_CLIENT_ID }}
    steps:
      # Fork adaptation: upstream hard-requires a deployed Cloudflare relay +
      # Clerk config here, which gates the entire desktop build matrix. When
      # none of that is configured, emit an empty public config and an empty
      # tracing env instead so the desktop artifacts still build (the apps
      # treat empty cloud config as "T4 Connect disabled").
      - id: relay_mode
        name: Detect relay configuration
        shell: bash
        run: |
          if [[ -n "${CLOUDFLARE_API_TOKEN:-}" && -n "${CLOUDFLARE_ACCOUNT_ID:-}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "No relay deployment configuration found; releasing without T4 Connect cloud features."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.relay_mode.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Vite+
        if: steps.relay_mode.outputs.enabled == 'true'
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: |
            args:
              - --filter=t4code-relay...

      - id: relay_state
        if: steps.relay_mode.outputs.enabled == 'true'
        name: Read production relay tracing config
        shell: bash
        run: |
          vp run --filter t4code-relay deploy \
            --stage prod \
            --read-state \
            --github-output \
            --github-env-file "$RUNNER_TEMP/relay-client-tracing.env"

      - name: Write empty relay client tracing config
        if: steps.relay_mode.outputs.enabled != 'true'
        shell: bash
        run: ': > "$RUNNER_TEMP/relay-client-tracing.env"'

      - name: Upload relay client tracing config
        uses: actions/upload-artifact@v7
        with:
          name: relay-client-tracing-config
          path: ${{ runner.temp }}/relay-client-tracing.env
          if-no-files-found: error
          retention-days: 1

      - id: public_config
        name: Resolve production relay public config
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ steps.relay_mode.outputs.enabled }}" != "true" ]]; then
            echo "clerk_publishable_key=" >> "$GITHUB_OUTPUT"
            echo "clerk_jwt_template=" >> "$GITHUB_OUTPUT"
            echo "clerk_cli_oauth_client_id=" >> "$GITHUB_OUTPUT"
            echo "relay_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          relay_domain="${RELAY_DOMAIN:-}"
          if [[ -z "$relay_domain" && -n "${RELAY_API_ZONE_NAME:-}" ]]; then
            relay_domain="relay.$RELAY_API_ZONE_NAME"
          fi
          required=(
            relay_domain
            CLERK_PUBLISHABLE_KEY
            CLERK_JWT_TEMPLATE
            CLERK_CLI_OAUTH_CLIENT_ID
          )
          missing=()
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required relay deployment configuration: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          echo "clerk_publishable_key=$CLERK_PUBLISHABLE_KEY" >> "$GITHUB_OUTPUT"
          echo "clerk_jwt_template=$CLERK_JWT_TEMPLATE" >> "$GITHUB_OUTPUT"
          echo "clerk_cli_oauth_client_id=$CLERK_CLI_OAUTH_CLIENT_ID" >> "$GITHUB_OUTPUT"
          echo "relay_url=https://$relay_domain" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: [preflight, relay_public_config]
    if: ${{ !cancelled() && needs.preflight.result == 'success' && needs.relay_public_config.result == 'success' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    env:
      T4CODE_CLERK_PUBLISHABLE_KEY: ${{ needs.relay_public_config.outputs.clerk_publishable_key }}
      T4CODE_CLERK_JWT_TEMPLATE: ${{ needs.relay_public_config.outputs.clerk_jwt_template }}
      T4CODE_CLERK_CLI_OAUTH_CLIENT_ID: ${{ needs.relay_public_config.outputs.clerk_cli_oauth_client_id }}
      T4CODE_RELAY_URL: ${{ needs.relay_public_config.outputs.relay_url }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-26
            platform: mac
            target: dmg
            arch: arm64
          - label: macOS x64
            runner: macos-26-intel
            platform: mac
            target: dmg
            arch: x64
          - label: Linux x64
            runner: ubuntu-24.04
            platform: linux
            target: appimage
            arch: x64
          - label: Windows x64
            runner: windows-2025
            platform: win
            target: nsis
            arch: x64
          # - label: Windows arm64
          #   runner: windows-11-arm
          #   platform: win
          #   target: nsis
          #   arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Download relay client tracing config
        uses: actions/download-artifact@v8
        with:
          name: relay-client-tracing-config
          path: ${{ runner.temp }}/relay-client-tracing

      - name: Load relay client tracing config
        shell: bash
        run: |
          config_path="$RUNNER_TEMP/relay-client-tracing/relay-client-tracing.env"
          tracing_token="$(sed -n 's/^T4CODE_RELAY_CLIENT_OTLP_TRACES_TOKEN=//p' "$config_path")"
          echo "::add-mask::$tracing_token"
          cat "$config_path" >> "$GITHUB_ENV"

      - name: Align package manifest versions to release version
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/desktop/src-tauri

      - name: Install Tauri Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build desktop artifact
        shell: bash
        run: |
          node scripts/build-desktop-artifact.ts \
            --platform "${{ matrix.platform }}" \
            --target "${{ matrix.target }}" \
            --arch "${{ matrix.arch }}" \
            --output-dir release \
            --verbose

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish

          shopt -s nullglob
          for pattern in \
            "release/*.dmg" \
            "release/*.AppImage" \
            "release/*.exe"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  # Fork adaptation: upstream's `publish_cli` job is omitted — the npm package
  # `t4code` is owned by upstream and its OIDC trusted-publisher binding points at
  # pingdotgg/t4code, so a fork cannot publish it. Rename the package and add
  # your own trusted publisher before restoring that job.

  release:
    name: Publish GitHub Release
    needs: [preflight, build]
    if: ${{ !failure() && !cancelled() && needs.preflight.result == 'success' && needs.build.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Fork adaptation: publish with the workflow's own GITHUB_TOKEN instead of
    # upstream's release GitHub App (RELEASE_APP_ID/RELEASE_APP_PRIVATE_KEY).
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: Publish release
        if: needs.preflight.outputs.previous_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          generate_release_notes: true
          previous_tag: ${{ needs.preflight.outputs.previous_tag }}
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release-assets/*.dmg
            release-assets/*.AppImage
            release-assets/*.exe
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish first release
        if: needs.preflight.outputs.previous_tag == ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: ${{ needs.preflight.outputs.release_name }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            release-assets/*.dmg
            release-assets/*.AppImage
            release-assets/*.exe
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # Fork adaptation: upstream's `deploy_web` job (hosted web app on Vercel,
  # app.t4code.codes domains) is omitted — it targets upstream's Vercel project.
  # Configure your own Vercel project and domains before restoring it.

  finalize:
    name: Finalize release
    if: ${{ !failure() && !cancelled() && needs.preflight.result == 'success' && needs.release.result == 'success' && needs.preflight.outputs.release_channel == 'stable' }}
    needs: [preflight, release]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Fork adaptation: push the version-bump commit with the workflow's own
    # GITHUB_TOKEN instead of upstream's release GitHub App. Note this only
    # works while `main` has no branch protection blocking the token, and the
    # push will not trigger other workflows (GitHub suppresses workflow runs
    # for GITHUB_TOKEN pushes, which also prevents release/deploy loops).
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: |
            args:
              - --filter=@t4code/scripts...
              - --filter=@t4code/oxlint-plugin-t4code...

      - id: update_versions
        name: Update version strings
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: node scripts/update-release-package-versions.ts "$RELEASE_VERSION" --github-output

      - name: Format package.json files
        if: steps.update_versions.outputs.changed == 'true'
        run: vp fmt apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json

      - name: Refresh lockfile
        if: steps.update_versions.outputs.changed == 'true'
        run: vp install --lockfile-only --ignore-scripts

      - name: Commit and push version bump
        if: steps.update_versions.outputs.changed == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          if git diff --quiet -- apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json apps/server/Cargo.toml apps/desktop/src-tauri/Cargo.toml Cargo.lock pnpm-lock.yaml; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json apps/server/Cargo.toml apps/desktop/src-tauri/Cargo.toml Cargo.lock pnpm-lock.yaml
          git commit -m "chore(release): prepare $RELEASE_TAG"
          git push origin HEAD:main

  # Fork adaptation: upstream's `announce_discord` job (Discord release
  # announcements) is omitted — this fork has no Discord server.
