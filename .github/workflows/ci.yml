name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Check
    runs-on: ubuntu-24.04
    # GitHub-hosted runners have fewer vCPUs than the upstream Blacksmith
    # runners, so the jobs need more headroom.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version-file: package.json
          cache: true
          run-install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@46511b1c83438f0dd37c02d843619ece5a4abb5b # 1.97.1
        with:
          components: rustfmt, clippy

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            . -> target

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Check
        run: vp check

      - name: Typecheck
        run: vpr typecheck

      - name: Rust format
        run: cargo fmt --all --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build desktop pipeline
        run: vp run build:desktop

  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@46511b1c83438f0dd37c02d843619ece5a4abb5b # 1.97.1

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            . -> target

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Test
        run: vp run test

      - name: Rust workspace tests
        run: cargo test --workspace -j 2

  release_smoke:
    name: Release Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Exercise release-only workflow steps
        run: node scripts/release-smoke.ts

  native_desktop:
    name: Native desktop - ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x64
            runner: ubuntu-22.04
            platform: linux
            target: appimage
            arch: x64
          - label: Windows x64
            runner: windows-2025
            platform: win
            target: nsis
            arch: x64
          # Windows ARM remains disabled while scripts/run-msvc-x64.mjs is
          # intentionally architecture-specific.
          - label: macOS arm64
            runner: macos-26
            platform: mac
            target: dmg
            arch: arm64
          - label: macOS x64
            runner: macos-26-intel
            platform: mac
            target: dmg
            arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@46511b1c83438f0dd37c02d843619ece5a4abb5b # 1.97.1

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            . -> target

      - name: Install Tauri Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Verify toolchain versions
        run: |
          node --version
          vp --version
          rustc --version

      - name: Install frozen dependencies
        run: vp install --frozen-lockfile

      - name: Build web application
        run: vp run --filter @t4code/web build

      - name: Test desktop Rust host
        run: vp run --filter @t4code/desktop test

      - name: Build native bundle without publishing
        run: >
          node scripts/build-desktop-artifact.ts
          --platform "${{ matrix.platform }}"
          --target "${{ matrix.target }}"
          --arch "${{ matrix.arch }}"
          --output-dir native-artifacts
          --verbose
