name: Deploy T4 Connect relay

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: none
  statuses: write

concurrency:
  group: relay-production
  cancel-in-progress: false

jobs:
  deploy_relay:
    name: Deploy production relay
    # Fork adaptation: only deploy when relay infrastructure is configured.
    # CLOUDFLARE_ACCOUNT_ID must be a REPOSITORY-level variable for this guard:
    # job-level `if:` cannot see environment-scoped variables because the
    # `production` environment only attaches after the job starts. Without
    # this guard every push to main fails on missing Cloudflare credentials.
    if: vars.CLOUDFLARE_ACCOUNT_ID != ''
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment:
      name: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      PLANETSCALE_ORGANIZATION: ${{ vars.PLANETSCALE_ORGANIZATION }}
      AXIOM_ORG_ID: ${{ vars.AXIOM_ORG_ID }}
      RELAY_DOMAIN: ${{ vars.RELAY_DOMAIN }}
      RELAY_API_ZONE_NAME: ${{ vars.RELAY_API_ZONE_NAME }}
      RELAY_TUNNEL_ZONE_NAME: ${{ vars.RELAY_TUNNEL_ZONE_NAME }}
      CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
      CLERK_JWT_AUDIENCE: ${{ vars.CLERK_JWT_AUDIENCE }}
      ALCHEMY_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@250f29ce396baf5e8f24498e17c0dfdebabc26eb # v1.15.0
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Deploy production relay stage
        id: deploy
        run: vp run --filter t4code-relay deploy --stage prod --yes --github-output
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PLANETSCALE_API_TOKEN_ID: ${{ secrets.PLANETSCALE_API_TOKEN_ID }}
          PLANETSCALE_API_TOKEN: ${{ secrets.PLANETSCALE_API_TOKEN }}
          AXIOM_TOKEN: ${{ secrets.AXIOM_TOKEN }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Publish relay deploy commit status
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const result = "${{ steps.deploy.outputs.result }}";
            const changed = "${{ steps.deploy.outputs.changed }}" === "true";
            const description = changed
              ? "Relay production deploy applied infrastructure changes."
              : result === "noop"
                ? "Relay production deploy was a no-op."
                : `Relay production deploy completed with result: ${result}.`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "success",
              context: "Relay deploy / production",
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
